<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bite — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, onValue, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-U1e7y93fB5C5wfvmu2YU-Q9rqaR-JE8",
    authDomain: "tapmenucustomer.firebaseapp.com",
    databaseURL: "https://tapmenucustomer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "tapmenucustomer",
    storageBucket: "tapmenucustomer.firebasestorage.app",
    messagingSenderId: "926437550071",
    appId: "1:926437550071:web:9863e28b98bcfbe776b0f2",
    measurementId: "G-MR3XHVY4V9"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  let firstLoad = true;

  // ── AUTH STATE ──
  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginPass').value = '';
      startListening();
    } else {
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('adminWrap').style.display = 'none';
      firstLoad = true;
    }
  });

  // ── LOGIN / LOGOUT ──
  window.doLogin = async function() {
    const email = document.getElementById('loginUser').value.trim();
    const pass  = document.getElementById('loginPass').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('loginError');
    btn.disabled = true; btn.textContent = 'Signing in…'; err.style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In';
    }
  };

  window.doLogout = async function() {
    await signOut(auth);
    document.getElementById('loginUser').value = '';
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') window.doLogin();
  });

  // ── REALTIME LISTENER ──
  function startListening() {
    const ordersRef = ref(db, 'orders');
    onValue(ordersRef, snapshot => {
      const data = snapshot.val() || {};
      const orders = Object.entries(data).map(([key, val]) => ({ ...val, _key: key }));
      // Sort: pending first, then by timestamp desc
      orders.sort((a, b) => {
        if (a.done !== b.done) return a.done ? 1 : -1;
        return b.timestamp - a.timestamp;
      });

      if (!firstLoad && orders.length > window._lastOrderCount) {
        showNotif();
      }
      window._lastOrderCount = orders.length;
      firstLoad = false;

      renderOrders(orders);
      window._allOrders = orders;
    });
  }

  // ── ACTIONS ──
  window.markDone = async function(key) {
    await update(ref(db, `orders/${key}`), { done: true });
  };

  window.deleteOrder = async function(key) {
    await remove(ref(db, `orders/${key}`));
  };

  window.clearDone = async function() {
    const ordersRef = ref(db, 'orders');
    const { get } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const snap = await get(ordersRef);
    const data = snap.val() || {};
    const promises = Object.entries(data)
      .filter(([, v]) => v.done)
      .map(([k]) => remove(ref(db, `orders/${k}`)));
    await Promise.all(promises);
  };
</script>

<link rel="stylesheet" href="admin-styles.css">
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">TheBite≈</div>
    <div class="login-sub">Admin Panel</div>
    <input class="login-field" id="loginUser" type="email" placeholder="Email" autocomplete="email" />
    <input class="login-field" id="loginPass" type="password" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Invalid email or password</div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <div>
      <div class="admin-title">TheBite≈ <span>Orders</span></div>
    </div>
    <div class="header-actions">
      <span class="badge" id="pendingBadge">0 pending</span>
      <button class="clear-btn" onclick="clearDone()">Clear done</button>
      <button class="stats-btn" onclick="openStats()">📊 Statistics</button>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="orders-empty" id="ordersEmpty">No orders yet. Waiting...</div>
    <div id="ordersList"></div>
  </div>
</div>

<!-- ══ NOTIFICATION ══ -->
<div class="notif" id="notif">🍽️ New order received!</div>

<!-- ══ STATS MODAL ══ -->
<div class="stats-overlay" id="statsOverlay" onclick="closeStats()"></div>
<div class="stats-modal" id="statsModal">
  <div class="stats-header">
    <div class="stats-title">📊 Statistics</div>
    <button class="cart-close" onclick="closeStats()">✕</button>
  </div>
  <div class="stats-tabs">
    <button class="stats-tab active" onclick="switchTab('cards')">Summary</button>
    <button class="stats-tab" onclick="switchTab('chart')">Graph</button>
  </div>
  <div class="stats-body" id="statsBody"></div>
  <div class="stats-chart-wrap" id="statsChartWrap" style="display:none">
    <div class="chart-period-btns">
      <button class="chart-period active" onclick="setChartPeriod('today',this)">Today</button>
      <button class="chart-period" onclick="setChartPeriod('week',this)">Week</button>
      <button class="chart-period" onclick="setChartPeriod('month',this)">Month</button>
    </div>
    <canvas id="statsCanvas" height="220"></canvas>
  </div>
</div>

<script>
function renderOrders(orders) {
  const list  = document.getElementById('ordersList');
  const empty = document.getElementById('ordersEmpty');
  const badge = document.getElementById('pendingBadge');

  const pending = orders.filter(o => !o.done).length;
  badge.textContent = `${pending} pending`;

  if (orders.length === 0) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = '';

  orders.forEach(order => {
    const card = document.createElement('div');
    card.className = 'order-card' + (order.done ? ' done' : ' new-order');

    const time     = new Date(order.timestamp).toLocaleTimeString('bg-BG', { hour:'2-digit', minute:'2-digit' });
    const date     = new Date(order.timestamp).toLocaleDateString('bg-BG');
    const totalEur = (order.total / 1.95583).toFixed(2);

    const itemsHtml = (order.items || []).map(item => {
      const lineTotal = item.price * item.qty;
      return `<div class="order-item-row">
        <span class="order-item-name">${item.name}</span>
        <span class="order-item-qty">x${item.qty}</span>
        <span class="order-item-price">${lineTotal.toFixed(2)} лв.</span>
      </div>`;
    }).join('');

    const noteHtml = order.note && order.note !== 'Няма' && order.note !== 'None'
      ? `<div class="order-note">📝 ${order.note}</div>` : '';

    card.innerHTML = `
      <div class="order-card-header">
        <div>
          <div class="order-table">Маса ${order.table}</div>
          <div class="order-time">${date} — ${time}</div>
        </div>
        <div class="order-status">
          <div class="status-dot"></div>
          <span class="status-label">${order.done ? 'Done' : 'Pending'}</span>
        </div>
      </div>
      <div class="order-card-body">
        <div class="order-items">${itemsHtml}</div>
        <div class="order-total-row">
          <span class="order-total-label">Total</span>
          <span class="order-total-value">${order.total.toFixed(2)} лв.<span class="order-total-eur">(${totalEur} €)</span></span>
        </div>
        ${noteHtml}
      </div>
      <div class="order-card-footer">
        <button class="delete-btn" onclick="deleteOrder('${order._key}')">Delete</button>
        <button class="done-btn" onclick="markDone('${order._key}')" ${order.done ? 'disabled' : ''}>
          ${order.done ? '✓ Done' : 'Mark as done'}
        </button>
      </div>`;

    list.appendChild(card);
  });
}

function showNotif() {
  const n = document.getElementById('notif');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 4000);
}

window._lastOrderCount = 0;
window._allOrders = [];
let _chartPeriod = 'today';
let _activeTab   = 'cards';

function openStats() {
  window._allOrders = window._allOrders || [];
  renderStats(window._allOrders);
  document.getElementById('statsOverlay').classList.add('open');
  document.getElementById('statsModal').classList.add('open');
}

function closeStats() {
  document.getElementById('statsOverlay').classList.remove('open');
  document.getElementById('statsModal').classList.remove('open');
}

function switchTab(tab) {
  _activeTab = tab;
  document.querySelectorAll('.stats-tab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === tab || (tab==='cards' && b.textContent==='Summary') || (tab==='chart' && b.textContent==='Graph')));
  document.getElementById('statsBody').style.display        = tab === 'cards' ? 'grid' : 'none';
  document.getElementById('statsChartWrap').style.display   = tab === 'chart' ? 'block' : 'none';
  if (tab === 'chart') drawChart(window._allOrders, _chartPeriod);
}

function setChartPeriod(p, btn) {
  _chartPeriod = p;
  document.querySelectorAll('.chart-period').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawChart(window._allOrders, p);
}

function renderStats(orders) {
  const now = Date.now();
  const hour  = 60 * 60 * 1000;
  const day   = 24 * hour;
  const week  = 7 * day;
  const month = 30 * day;
  const year  = 365 * day;

  function filter(ms) { return orders.filter(o => (now - o.timestamp) <= ms); }
  function stats(filtered) {
    return { count: filtered.length, revenue: filtered.reduce((s,o) => s + (o.total||0), 0) };
  }

  const periods = [
    { label: 'Last Hour',  data: stats(filter(hour))  },
    { label: 'Today',      data: stats(filter(day))   },
    { label: 'This Week',  data: stats(filter(week))  },
    { label: 'This Month', data: stats(filter(month)) },
    { label: 'This Year',  data: stats(filter(year))  },
    { label: 'All Time',   data: stats(orders)        },
  ];

  const body = document.getElementById('statsBody');
  body.innerHTML = periods.map(p => `
    <div class="stat-card">
      <div class="stat-period">${p.label}</div>
      <div class="stat-orders">${p.data.count} <span>orders</span></div>
      <div class="stat-revenue">${p.data.revenue.toFixed(2)} лв.</div>
      <div class="stat-eur">${(p.data.revenue / 1.95583).toFixed(2)} €</div>
    </div>
  `).join('');

  if (_activeTab === 'chart') drawChart(orders, _chartPeriod);
}

function drawChart(orders, period) {
  const canvas = document.getElementById('statsCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const now = new Date();

  let labels = [], buckets = [];

  if (period === 'today') {
    // 24 hours
    for (let h = 0; h < 24; h++) {
      labels.push(h + ':00');
      const start = new Date(now); start.setHours(h, 0, 0, 0);
      const end   = new Date(now); end.setHours(h, 59, 59, 999);
      buckets.push(orders.filter(o => o.timestamp >= start && o.timestamp <= end).length);
    }
  } else if (period === 'week') {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    for (let d = 6; d >= 0; d--) {
      const day = new Date(now); day.setDate(now.getDate() - d);
      labels.push(days[day.getDay()]);
      const start = new Date(day); start.setHours(0,0,0,0);
      const end   = new Date(day); end.setHours(23,59,59,999);
      buckets.push(orders.filter(o => o.timestamp >= start && o.timestamp <= end).length);
    }
  } else if (period === 'month') {
    for (let d = 29; d >= 0; d--) {
      const day = new Date(now); day.setDate(now.getDate() - d);
      labels.push(day.getDate() + '/' + (day.getMonth()+1));
      const start = new Date(day); start.setHours(0,0,0,0);
      const end   = new Date(day); end.setHours(23,59,59,999);
      buckets.push(orders.filter(o => o.timestamp >= start && o.timestamp <= end).length);
    }
  }

  const W = canvas.parentElement.clientWidth - 40;
  canvas.width  = W;
  canvas.height = 220;

  const pad = { top: 20, right: 20, bottom: 40, left: 36 };
  const cW = W - pad.left - pad.right;
  const cH = 220 - pad.top - pad.bottom;
  const max = Math.max(...buckets, 1);

  ctx.clearRect(0, 0, W, 220);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (cH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    ctx.fillStyle = '#a89070';
    ctx.font = '10px Crimson Text, serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(max - (max/4)*i), pad.left - 6, y + 4);
  }

  const barW  = Math.max(4, (cW / buckets.length) * 0.6);
  const gap   = cW / buckets.length;
  const skipLabel = period === 'month' ? 4 : (period === 'today' ? 3 : 1);

  buckets.forEach((val, i) => {
    const x   = pad.left + i * gap + gap / 2;
    const bH  = val === 0 ? 0 : Math.max(4, (val / max) * cH);
    const y   = pad.top + cH - bH;

    // Bar gradient
    const grad = ctx.createLinearGradient(0, y, 0, y + bH);
    grad.addColorStop(0, '#e8773a');
    grad.addColorStop(1, '#9a4710');
    ctx.fillStyle = val > 0 ? grad : 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.roundRect(x - barW/2, y, barW, bH, 3);
    ctx.fill();

    // Value on top
    if (val > 0) {
      ctx.fillStyle = '#f0e6d0';
      ctx.font = 'bold 11px Crimson Text, serif';
      ctx.textAlign = 'center';
      ctx.fillText(val, x, y - 5);
    }

    // X label
    if (i % skipLabel === 0) {
      ctx.fillStyle = '#a89070';
      ctx.font = '10px Crimson Text, serif';
      ctx.textAlign = 'center';
      ctx.fillText(labels[i], x, pad.top + cH + 16);
    }
  });
}

</script>
</body>
</html>
